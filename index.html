<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de figurinhas BTS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- CAPA -->
    <div id="capa-album" onclick="entrarNoAlbum()">
        <div class="bts-logo">
            <div class="logo-door"></div>
            <div class="logo-door right"></div>
        </div>
        <h1>ARMY</h1>
        <p>O Álbum de Figurinhas Virtual, feito para uma grande fã</p>
        <button class="btn-entrar">Abrir Álbum</button>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="conteudo-principal">
        <header>
            <div id="carteira-loja" class="carteira-fragmentos">💎 0 Fragmentos</div>
        </header>

        <div class="abas-navegacao">
            <button id="tab-banca" class="aba-btn active" onclick="alternarAba('banca')">Lojinha 🔮</button>
            <button id="tab-album" class="aba-btn" onclick="alternarAba('album')">Meu Álbum 📖</button>
        </div>

        <!-- SEÇÃO ABA 1: LOJINHA -->
        <div id="secao-banca" class="secao-aba active">
            <div class="banca">
                <h3 style="margin-bottom: 5px;">Banca de Photocards</h3>
                <p style="color: #aaa; font-size: 0.85rem;">Abra os pacotes diários coletando memórias do BTS!</p>
                
                <div id="booster-area-container" class="booster-area">
                    <div id="pack-virtual" class="booster-pack" onclick="engatilharAbertura()">
                        <div class="pack-logo">✨</div>
                        <div>BTS PACK</div>
                    </div>
                </div>

                <button id="btn-abrir" class="btn-pacote" onclick="engatilharAbertura()">Abrir Pacotinho 🛍️</button>
                <div id="timer" class="timer"></div>
                
                <!-- CONTAINER DAS ATIVIDADES -->
                <div class="container-loja-atividades">
                    
                    <!-- ROLETA DA SORTE -->
                    <div class="roleta-container">
                        <div style="font-size: 0.85rem; font-weight: bold; color: #aaa; margin-bottom: 8px;">Roleta da Sorte</div>
                        <div class="roleta-wrapper">
                            <div class="roleta-ponteiro"></div>
                            <div id="disco-roleta" class="roleta-disco"></div>
                            <div class="roleta-centro"></div>
                        </div>
                        <button id="btn-rodar-roleta" class="btn-roleta" onclick="rodarRoletaSorte()">Girar Roleta (5 💎)</button>
                    </div>

                    <!-- RASPADINHA PREMIADA GIGANTE -->
                    <div class="raspador-box">
                        <div style="font-size: 0.85rem; font-weight: bold; color: #aaa; margin-bottom: 8px;">Raspadinha Faltante</div>
                        
                        <div id="raspadinha-placeholder" class="raspadinha-placeholder-status">?</div>
                        
                        <div id="raspadinha-game" class="raspadinha-widget" style="display: none;">
                            <div id="raspadinha-imagem-fundo" class="raspadinha-foto-revelada"></div>
                            <canvas id="raspadinha-canvas" class="raspadinha-canvas-tinta"></canvas>
                        </div>
                        
                        <button id="btn-comprar-raspadinha" class="btn-comprar-raspadinha" onclick="gerarNovaRaspadinha()">Comprar (10 💎)</button>
                    </div>
                </div>
            </div>

            <!-- SEÇÃO DO INVENTÁRIO -->
            <div id="bloco-inventario-separado" class="secao-inventario-separador">
                <div class="linha-divisoria-neon"></div>
                <div class="header-inventario-flex">
                    <div class="titulo-inventario">Photocards Ganhos</div>
                    <button class="btn-colar-tudo" onclick="colarTodasAsFigurinhasDoInventario()">Colar Todas</button>
                </div>
                <div id="pack-opening" class="pack-opening"></div>
            </div>
        </div>

        <!-- SEÇÃO ABA 2: ÁLBUM -->
        <div id="secao-album" class="secao-aba">
            <div id="progresso-total" class="progresso-album-container">Carregando photocards colados...</div>
            
            <div class="album-wrapper">
                <div class="album-grid" id="album-grid"></div>
            </div>
            
            <div class="controles-paginas" style="max-width: 460px; width: 100%;">
                <button id="btn-ant" class="btn-pag" onclick="mudarPagina(-1)">◀ Anterior</button>
                <span id="indicador-pagina" style="font-weight: bold; font-size: 0.85rem; color: #ffb7ff;">Página 1 de 17</span>
                <button id="btn-prox" class="btn-pag" onclick="mudarPagina(1)">Próxima ▶</button>
            </div>
        </div>

        <button class="dev-btn" onclick="resetarTempo()">Pular Relógio (Testar Relógio)</button>
    </div>

    <!-- MODAL ZOOM -->
    <div id="modal-zoom" class="modal" onclick="fecharModal()">
        <div class="modal-conteudo" onclick="event.stopPropagation()">
            <button class="btn-fechar-modal" onclick="fecharModal()">X</button>
            <div class="modal-wrapper-foto">
                <div id="modal-badge-id" class="badge-numero" style="font-size: 0.85rem; padding: 4px 10px; top: 10px; left: 10px;">#--</div>
                <img id="modal-img" class="modal-foto" src="" alt="Photocard">
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
