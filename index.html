<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARMY Collector's Album 💜</title>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #b5179e;
            --army-purple: #3f37c9;
            --bg: #1a1a2e;
            --card-dark: #24243e;
            --text-light: #f7f7f9;
            
            /* Cores de Raridade K-Pop */
            --comum: #a8dadc;
            --incomum: #4cc9f0;
            --raro: #f72585;
            --lendario: #ffbe0b;

            /* Fundos dos Cards */
            --bg-comum: rgba(168, 218, 220, 0.1);
            --bg-incomum: rgba(76, 201, 240, 0.15);
            --bg-raro: rgba(247, 37, 133, 0.2);
            --bg-lendario: rgba(255, 190, 11, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(180deg, #0f0c20 0%, #1a1a2e 100%);
            color: var(--text-light);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CAPA */
        #capa-album {
            background: linear-gradient(135deg, #4d1234 0%, var(--primary) 50%, #1e0034 100%);
            width: 100%;
            max-width: 500px;
            height: 85vh;
            max-height: 650px;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(114, 9, 183, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 30px;
            cursor: pointer;
            border: 4px solid var(--secondary);
            margin-top: 3vh;
            position: relative;
            overflow: hidden;
            will-change: transform;
        }

        .bts-logo {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        .logo-door {
            width: 35px;
            height: 90px;
            background: white;
            transform: skewY(15deg);
        }
        .logo-door.right {
            transform: skewY(-15deg);
        }

        #capa-album h1 {
            font-size: 2.4rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        #capa-album p {
            font-size: 1.1rem;
            color: #ffb7ff;
            margin-bottom: 30px;
        }

        .btn-entrar {
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(181, 23, 158, 0.6);
            cursor: pointer;
        }

        /* CONTEÚDO PRINCIPAL */
        #conteudo-principal {
            display: none;
            width: 100%;
            max-width: 800px;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin: 20px 0;
        }

        header h2 {
            color: #fff;
            font-size: 2rem;
            text-shadow: 0 0 10px var(--secondary);
        }

        #progresso-total {
            color: #b5179e;
            font-weight: bold;
            margin-top: 5px;
        }

        /* BANCA / MAGIC SHOP */
        .banca {
            background: var(--card-dark);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            text-align: center;
            width: 100%;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .booster-area {
            position: relative;
            width: 160px;
            height: 220px;
            margin: 0 auto;
            perspective: 1200px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: height, opacity;
        }

        .booster-area.hidden {
            height: 0px;
            margin: 0 auto;
            opacity: 0;
            pointer-events: none;
        }

        .booster-pack {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #b5179e, #7209b7, #3f37c9);
            border: 3px solid #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            cursor: pointer;
            z-index: 10;
            will-change: transform, opacity, filter;
            transition: transform 0.2s ease;
        }

        .booster-pack .pack-logo {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        .booster-pack.shake {
            animation: shakePack 0.4s linear infinite;
        }

        .booster-pack.burst {
            animation: burstPack 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes shakePack {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-2px, 1px) rotate(-1deg); }
            40% { transform: translate(2px, -1px) rotate(1.5deg); }
            60% { transform: translate(-1px, 2px) rotate(-0.5deg); }
            80% { transform: translate(2px, 1px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes burstPack {
            0% { transform: scale(1); opacity: 1; filter: brightness(1); }
            30% { transform: scale(1.15); opacity: 1; filter: brightness(1.8); }
            100% { transform: scale(0.1) rotate(45deg); opacity: 0; filter: brightness(3); }
        }

        .btn-pacote {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(114, 9, 183, 0.4);
            transition: all 0.3s ease;
            margin-top: 15px;
            display: inline-block;
        }

        .btn-pacote:disabled {
            background: #333344 !important;
            color: #666677 !important;
            box-shadow: none !important;
            cursor: not-allowed !important;
            border: 1px solid #444455;
        }

        /* PAINEL DE FRAGMENTOS */
        .reciclagem-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            border: 1px dashed rgba(255,255,255,0.1);
            display: inline-block;
            min-width: 200px;
        }

        .btn-reciclar {
            background: linear-gradient(90deg, #00f5d4, #00bbf9);
            color: #000;
            border: none;
            padding: 9px 20px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.3);
            transition: transform 0.2s ease;
            margin-top: 8px;
        }
        .btn-reciclar:hover:not(:disabled) {
            transform: scale(1.05);
        }
        .btn-reciclar:disabled {
            background: #444;
            color: #777;
            box-shadow: none;
            cursor: not-allowed;
        }

        .timer {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #ffb7ff;
            font-weight: bold;
        }

        /* REVELAÇÃO DAS CARTAS NO INVENTÁRIO */
        .pack-opening {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
            min-height: 110px;
        }

        .sticker-item {
            width: 80px;
            height: 107px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
            transform: scale(0);
            will-change: transform, opacity;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
        }

        .sticker-item.clicked-out {
            transform: scale(0.2) translateY(-40px) !important;
            opacity: 0 !important;
        }

        .spawn-comum {
            animation: spawnBasic 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes spawnBasic {
            to { transform: scale(1) rotate(-1.5deg); }
        }

        .spawn-rara {
            border: 3px solid var(--raro) !important;
            animation: spawnRaraAnim 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, pulseRaro 1.5s infinite alternate;
        }
        @keyframes spawnRaraAnim {
            to { transform: scale(1.04) rotate(1.5deg); }
        }
        @keyframes pulseRaro {
            0% { box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
            100% { box-shadow: 0 0 15px var(--raro); }
        }

        .spawn-lendaria {
            border: 3px solid var(--lendario) !important;
            animation: spawnLendariaAnim 0.75s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulseLendario 1s infinite alternate;
        }
        @keyframes spawnLendariaAnim {
            0% { transform: scale(0) rotateY(180deg); filter: brightness(2); }
            100% { transform: scale(1.08) rotateY(0deg); filter: brightness(1); }
        }
        @keyframes pulseLendario {
            0% { box-shadow: 0 5px 15px rgba(0,0,0,0.6); }
            100% { box-shadow: 0 0 25px var(--lendario), 0 0 5px #fff; }
        }

        /* GRID DO ÁLBUM */
        .album-wrapper {
            width: 100%;
            background: var(--card-dark);
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media (min-width: 600px) {
            .album-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .vaga-figurinha {
            padding: 12px;
            border-radius: 16px;
            border: 2px dashed #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            cursor: pointer;
        }

        .vaga-figurinha.colada {
            border-style: solid;
        }

        .slot-foto {
            width: 100%;
            aspect-ratio: 3 / 4;
            background-color: #151526;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: #444;
            overflow: hidden;
            position: relative;
        }

        .img-figurinha {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            will-change: opacity;
        }

        .img-figurinha.fade-smooth {
            display: block;
            opacity: 0;
            animation: fadeInPageCard 0.25s ease-out forwards;
        }

        .img-figurinha.just-pasted {
            display: block;
            animation: popInNewCard 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }

        @keyframes fadeInPageCard {
            to { opacity: 1; }
        }

        @keyframes popInNewCard {
            0% { transform: scale(0.7); opacity: 0; filter: brightness(1.5); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }

        .vaga-figurinha.colada .slot-foto span {
            display: none;
        }

        .vaga-figurinha.raridade-comum { background-color: var(--bg-comum); border-color: rgba(168, 218, 220, 0.3); }
        .vaga-figurinha.raridade-incomum { background-color: var(--bg-incomum); border-color: rgba(76, 201, 240, 0.4); }
        .vaga-figurinha.raridade-raro { background-color: var(--bg-raro); border-color: rgba(247, 37, 133, 0.5); }
        .vaga-figurinha.raridade-lendario { background-color: var(--bg-lendario); border-color: rgba(255, 190, 11, 0.6); }

        .badge-raridade {
            font-size: 0.6rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 8px;
            color: #000;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .vaga-figurinha.colada .badge-raridade {
            color: #fff;
        }

        /* PAGINAÇÃO */
        .controles-paginas {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            width: 100%;
        }

        .btn-pag {
            background: linear-gradient(90deg, var(--primary), var(--army-purple));
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .btn-pag:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-conteudo {
            background: #1e1e38;
            padding: 25px;
            border-radius: 24px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            position: relative;
            border: 2px solid var(--secondary);
        }

        .modal-foto {
            width: 100%;
            border-radius: 14px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6);
            border: 3px solid #fff;
        }

        .btn-fechar-modal {
            position: absolute;
            top: -15px; right: -15px;
            background: var(--raro);
            color: white;
            border: none;
            width: 38px; height: 38px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .dev-btn {
            margin: 25px 0;
            background: none;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 6px;
            color: #666;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* TOAST DE FRAGMENTO */
        .toast-fragmento {
            position: fixed;
            bottom: 30px;
            background: linear-gradient(90deg, #00f5d4, #3f37c9);
            color: #000;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 5px 20px rgba(0, 245, 212, 0.4);
            z-index: 2000;
            animation: slideUpToast 2s ease forwards;
        }
        @keyframes slideUpToast {
            0% { transform: translateY(50px); opacity: 0; }
            15% { transform: translateY(0); opacity: 1; }
            85% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-30px); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- CAPA -->
    <div id="capa-album" onclick="entrarNoAlbum()">
        <div class="bts-logo">
            <div class="logo-door"></div>
            <div class="logo-door right"></div>
        </div>
        <h1>ARMY EDITION</h1>
        <p>O Álbum de Figurinhas Virtual Oficial das Memórias do BTS</p>
        <button class="btn-entrar">Abrir Coleção 💜</button>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="conteudo-principal">
        <header>
            <h2>BTS Memory Lane Album 🌟</h2>
            <p id="progresso-total">Carregando photocards...</p>
        </header>

        <!-- BANCA -->
        <div class="banca">
            <h3 style="margin-bottom: 5px;">Magic Shop de Figurinhas 🔮</h3>
            <p style="color: #aaa; font-size: 0.85rem;">Abra pacotes diários ou junte fragmentos de repetidas!</p>
            
            <div id="booster-area-container" class="booster-area">
                <div id="pack-virtual" class="booster-pack" onclick="engatilharAbertura()">
                    <div class="pack-logo">✨</div>
                    <div>BTS PACK</div>
                </div>
            </div>

            <!-- NOME ALTERADO DE "Ripar" PARA "Abrir Pacotinho" -->
            <button id="btn-abrir" class="btn-pacote" onclick="engatilharAbertura()">Abrir Pacotinho 🛍️</button>
            <div id="timer" class="timer"></div>
            
            <!-- FORJA DE FRAGMENTOS -->
            <div class="reciclagem-box">
                <div style="font-size: 0.85rem; font-weight: bold;" id="info-repetidas">Fragmentos Obtidos: 0 / 3</div>
                <!-- NOME ALTERADO DE "Giro Extra" PARA "Abrir Pacotinho Extra" -->
                <button id="btn-reciclar" class="btn-reciclar" onclick="executarForja()" disabled>Abrir Pacotinho Extra 🔮</button>
            </div>

            <div id="pack-opening" class="pack-opening"></div>
        </div>

        <!-- ÁLBUM -->
        <div class="album-wrapper">
            <div class="album-grid" id="album-grid"></div>
            
            <div class="controles-paginas">
                <button id="btn-ant" class="btn-pag" onclick="mudarPagina(-1)">◀ Anterior</button>
                <span id="indicador-pagina" style="font-weight: bold; font-size: 0.85rem; color: #ffb7ff;">Página 1 de 25</span>
                <button id="btn-prox" class="btn-pag" onclick="mudarPagina(1)">Próxima ▶</button>
            </div>
        </div>

        <button class="dev-btn" onclick="resetarTempo()">Pular Relógio (Testar Relógio)</button>
    </div>

    <!-- MODAL ZOOM -->
    <div id="modal-zoom" class="modal" onclick="fecharModal()">
        <div class="modal-conteudo" onclick="event.stopPropagation()">
            <button class="btn-fechar-modal" onclick="fecharModal()">X</button>
            <img id="modal-img" class="modal-foto" src="" alt="Photocard">
        </div>
    </div>

    <script>
        const TOTAL_FIGURINHAS = 150;
        const FIGURINHAS_POR_PAGINA = 6;
        let paginaAtual = 1;
        let database = [];
        const extensoesSuportadas = ['.avif', '.webp', '.jpg', '.jpeg', '.png'];

        function descobrirEfitarImagem(imgElement, idDoCard, estiloBackgroundElement = null, callbackAoAchar = null) {
            let indiceExtensao = 0;
            function tentarProximaExtensao() {
                if (indiceExtensao >= extensoesSuportadas.length) return;
                const caminhoTeste = `imagens/${idDoCard}${extensoesSuportadas[indiceExtensao]}`;
                const imagemTeste = new Image();
                imagemTeste.onload = function() {
                    if (imgElement) imgElement.src = caminhoTeste;
                    if (estiloBackgroundElement) estiloBackgroundElement.style.backgroundImage = `url('${caminhoTeste}')`;
                    if (callbackAoAchar) callbackAoAchar(caminhoTeste);
                };
                imagemTeste.onerror = function() {
                    indiceExtensao++;
                    tentarProximaExtensao();
                };
                imagemTeste.src = caminhoTeste;
            }
            tentarProximaExtensao();
        }

        function inicializarBancoDados() {
            for (let i = 1; i <= TOTAL_FIGURINHAS; i++) {
                let raridade = "comum";
                if (i <= 70) raridade = "comum";
                else if (i <= 115) raridade = "incomum";
                else if (i <= 140) raridade = "raro";
                else raridade = "lendario";

                database.push({ id: i, raridade: raridade });
            }
        }

        let progresso = JSON.parse(localStorage.getItem('bts_album_fragments_v6')) || {
            coladas: [],
            inventario: [],
            fragmentos: 0,
            proximoPacote: 0
        };

        function atualizarPainelFragmentos() {
            document.getElementById('info-repetidas').innerText = `Fragmentos Obtidos: ${progresso.fragmentos} / 3`;
            document.getElementById('btn-reciclar').disabled = progresso.fragmentos < 3;
        }

        function salvarDados() {
            localStorage.setItem('bts_album_fragments_v6', JSON.stringify(progresso));
            document.getElementById('progresso-total').innerText = `Photocards Colados: ${progresso.coladas.length} / ${TOTAL_FIGURINHAS} 💜`;
            atualizarPainelFragmentos();
        }

        function entrarNoAlbum() {
            document.getElementById('capa-album').style.display = 'none';
            document.getElementById('conteudo-principal').style.display = 'flex';
            renderizarPagina();
            atualizarVisualBooster();
        }

        function renderizarPagina() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = '';
            const inicio = (paginaAtual - 1) * FIGURINHAS_POR_PAGINA;
            const fim = Math.min(inicio + FIGURINHAS_POR_PAGINA, TOTAL_FIGURINHAS);
            const totalPaginas = Math.ceil(TOTAL_FIGURINHAS / FIGURINHAS_POR_PAGINA);

            for (let i = inicio; i < fim; i++) {
                const fig = database[i];
                const jaColada = progresso.coladas.includes(fig.id);
                const vaga = document.createElement('div');
                vaga.id = `vaga-album-${fig.id}`;
                vaga.className = `vaga-figurinha ${jaColada ? 'colada' : ''} raridade-${fig.raridade}`;
                vaga.onclick = () => expandirFigurinha(fig.id);

                vaga.innerHTML = `
                    <span class="badge-raridade" style="background-color: var(--${fig.raridade}); color: ${fig.raridade === 'comum' ? '#222' : '#fff'}">${fig.raridade}</span>
                    <div class="slot-foto">
                        <span>#${fig.id}</span>
                        <img class="img-figurinha" id="img-card-${fig.id}" alt="Card ${fig.id}">
                    </div>
                `;
                grid.appendChild(vaga);

                if (jaColada) {
                    const imgElement = document.getElementById(`img-card-${fig.id}`);
                    imgElement.className = "img-figurinha fade-smooth";
                    descobrirEfitarImagem(imgElement, fig.id);
                }
            }
            document.getElementById('indicador-pagina').innerText = `Página ${paginaAtual} de ${totalPaginas}`;
            document.getElementById('btn-ant').disabled = paginaAtual === 1;
            document.getElementById('btn-prox').disabled = paginaAtual === totalPaginas;
        }

        function mudarPagina(direcao) {
            paginaAtual += direcao;
            renderizarPagina();
        }

        function expandirFigurinha(id) {
            if (!progresso.coladas.includes(id)) return;
            const modalImg = document.getElementById('modal-img');
            descobrirEfitarImagem(modalImg, id);
            document.getElementById('modal-zoom').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modal-zoom').style.display = 'none';
        }

        function sortearFigurinha() {
            const rand = Math.random() * 100;
            let raridadeEscolhida = "comum";
            if (rand < 2) raridadeEscolhida = "lendario";       
            else if (rand < 15) raridadeEscolhida = "raro";     
            else if (rand < 45) raridadeEscolhida = "incomum";  

            const opcionais = database.filter(f => f.raridade === raridadeEscolhida);
            return opcionais[Math.floor(Math.random() * opcionais.length)].id;
        }

        function engatilharAbertura() {
            const agora = new Date().getTime();
            if (agora < progresso.proximoPacote) return;

            const pack = document.getElementById('pack-virtual');
            const btn = document.getElementById('btn-abrir');
            const area = document.getElementById('booster-area-container');
            
            btn.disabled = true;
            pack.className = "booster-pack shake"; 

            setTimeout(() => {
                pack.className = "booster-pack burst"; 
                setTimeout(() => {
                    pack.style.display = "none"; 
                    area.classList.add('hidden'); 
                    abrirPacoteLogica(); 
                }, 580);
            }, 850);
        }

        function criarToastFragmento() {
            const toast = document.createElement('div');
            toast.className = 'toast-fragmento';
            toast.innerText = "✨ +1 Fragmento de Card Repetido!";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function abrirPacoteLogica() {
            const agora = new Date().getTime();
            let sorteadas = [sortearFigurinha(), sortearFigurinha(), sortearFigurinha()];
            let teveRepetida = false;

            sorteadas.forEach(id => {
                if (progresso.coladas.includes(id)) {
                    progresso.fragmentos++;
                    teveRepetida = true;
                } else {
                    if (!progresso.inventario.includes(id)) {
                        progresso.inventario.push(id);
                    } else {
                        progresso.fragmentos++;
                        teveRepetida = true;
                    }
                }
            });

            if (teveRepetida) criarToastFragmento();

            progresso.proximoPacote = agora + (24 * 60 * 60 * 1000); 
            salvarDados();
            renderizarInventario();
        }

        function renderizarInventario() {
            const container = document.getElementById('pack-opening');
            container.innerHTML = '';

            progresso.inventario.forEach((id, index) => {
                const fig = database.find(f => f.id === id);
                const item = document.createElement('div');
                
                let classeAnimacao = 'spawn-comum';
                if (fig.raridade === 'raro') classeAnimacao = 'spawn-rara';
                if (fig.raridade === 'lendario') classeAnimacao = 'spawn-lendaria';

                item.className = `sticker-item ${classeAnimacao}`;
                item.id = `inv-item-${id}`;
                item.style.borderColor = `var(--${fig.raridade})`;
                item.style.animationDelay = `${index * 0.15}s`;
                item.onclick = () => colarFigurinha(id);
                
                container.appendChild(item);

                const elInv = document.getElementById(`inv-item-${id}`);
                descobrirEfitarImagem(null, id, elInv);
            });
        }

        function colarFigurinha(id) {
            const cardElement = document.getElementById(`inv-item-${id}`);
            if (!cardElement) return;

            cardElement.classList.add('clicked-out');

            setTimeout(() => {
                if (!progresso.coladas.includes(id)) progresso.coladas.push(id);
                const index = progresso.inventario.indexOf(id);
                if (index > -1) progresso.inventario.splice(index, 1);

                salvarDados();
                cardElement.remove(); 

                const vagaAlbum = document.getElementById(`vaga-album-${id}`);
                if (vagaAlbum) {
                    vagaAlbum.classList.add('colada');
                    const imgElement = document.getElementById(`img-card-${id}`);
                    imgElement.className = "img-figurinha just-pasted"; 
                    descobrirEfitarImagem(imgElement, id);
                }

                if (progresso.coladas.length === TOTAL_FIGURINHAS) {
                    alert("🎉 Apoooobangpo! 👑 Você completou o álbum definitivo do BTS! 💜");
                }
            }, 220);
        }

        function executarForja() {
            if (progresso.fragmentos < 3) return;

            progresso.fragmentos -= 3;
            progresso.proximoPacote = 0; 
            salvarDados();
            atualizarVisualBooster();
        }

        function atualizarVisualBooster() {
            const pack = document.getElementById('pack-virtual');
            const btn = document.getElementById('btn-abrir');
            const area = document.getElementById('booster-area-container');
            const agora = new Date().getTime();

            if (agora >= progresso.proximoPacote) {
                area.classList.remove('hidden'); 
                pack.style.display = "flex";
                pack.className = "booster-pack";
                btn.disabled = false;
                // TEXTO ATUALIZADO
                btn.innerText = "Abrir Pacotinho 🛍️";
            } else {
                area.classList.add('hidden'); 
                btn.disabled = true;
            }
        }

        function iniciarTimer() {
            const btn = document.getElementById('btn-abrir');
            const timerDiv = document.getElementById('timer');
            
            setInterval(() => {
                const agora = new Date().getTime();
                const restante = progresso.proximoPacote - agora;

                if (restante <= 0) {
                    atualizarVisualBooster();
                    timerDiv.innerText = "Seu novo pack de Photocards chegou!";
                } else {
                    btn.disabled = true;
                    const horas = Math.floor((restante % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutos = Math.floor((restante % (1000 * 60 * 60)) / (1000 * 60));
                    const segundos = Math.floor((restante % (1000 * 60)) / 1000);
                    
                    // TEXTO ATUALIZADO NO BOTÃO TRAVADO
                    btn.innerText = `Pacotinho indisponível (${horas}h ${minutos}m ${segundos}s)`;
                    timerDiv.innerText = "Volte amanhã ou junte fragmentos na Forja de Fragmentos abaixo!";
                }
            }, 1000);
        }

        function resetarTempo() {
            progresso.proximoPacote = 0;
            salvarDados();
            atualizarVisualBooster();
        }

        inicializarBancoDados();
        salvarDados();
        renderizarInventario();
        iniciarTimer();
    </script>
</body>
</html>
